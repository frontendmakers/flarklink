<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flarklink | Launching Soon</title>
    <meta name="description" content="Flarklink is launching an exciting new platform. Stay tuned for updates!">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://flarklink.com/">
    <meta property="og:title" content="Flarklink | Launching Soon">
    <meta property="og:description" content="A brand new creative experience is launching soon. Stay tuned!">
    <meta property="og:image" content="https://flarklink.com/preview.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://flarklink.com/">
    <meta property="twitter:title" content="Flarklink | Launching Soon">
    <meta property="twitter:description" content="A brand new creative experience is launching soon. Stay tuned!">
    <meta property="twitter:image" content="https://flarklink.com/preview.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* Reset and Root Variables */
        :root {
            --bg-dark: #050508;
            --card-bg: rgba(10, 10, 16, 0.45);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            
            /* Branding Colors */
            --flarklink-color: #6366f1; /* Indigo */
            --flarklink-glow: rgba(99, 102, 241, 0.12);
            --accent-color: #a855f7; /* Purple */
            --accent-glow: rgba(168, 85, 247, 0.12);
            
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            perspective: 1000px;
        }

        /* Interactive Canvas Background - Full Fire */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Subtle Film Grain Noise Texture */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Main Container Setup */
        .main-container {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Floating Header */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0.5rem 0;
        }

        .brand-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.4rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            animation: fade-in-down 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .brand-pill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: pill-shimmer 4s infinite linear;
        }

        @keyframes pill-shimmer {
            0% { left: -100%; }
            30% { left: 200%; }
            100% { left: 200%; }
        }

        /* Central Landing Card */
        .card-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            margin: 1.5rem 0;
            width: 100%;
        }

        .glass-card {
            background: radial-gradient(800px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(255, 255, 255, 0.04), transparent 40%), var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 4.5rem 4rem;
            max-width: 580px;
            width: 100%;
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            animation: scale-up-fade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: border-color 0.5s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .card-content-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .card-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .card-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Accent glow line at the top */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--flarklink-color), var(--accent-color));
            opacity: 0.8;
        }

        /* Card Shimmer Sweep */
        .card-shimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.02) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: translateX(-150%) skewX(-25deg);
            pointer-events: none;
            animation: shimmer 8s infinite ease-in-out;
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-25deg); }
            15% { transform: translateX(150%) skewX(-25deg); }
            100% { transform: translateX(150%) skewX(-25deg); }
        }

        /* Logo Area Style with advanced draw animation */
        .logo-group {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2.5rem;
            transform: translateZ(30px);
        }

        .logo-box {
            width: 84px;
            height: 84px;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            color: var(--flarklink-color);
            box-shadow: 0 8px 24px var(--flarklink-glow);
            position: relative;
        }

        /* Drawing Animation for SVG paths */
        .logo-svg {
            width: 46px;
            height: 46px;
        }

        /* Outer stroke circles/lines draw animation */
        .svg-circle-main {
            stroke-dasharray: 120;
            stroke-dashoffset: 120;
            animation: drawCircle 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .svg-line-1, .svg-line-2 {
            stroke-dasharray: 40;
            stroke-dashoffset: 40;
            animation: drawLine 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        .svg-node-1, .svg-node-2 {
            transform: scale(0);
            transform-origin: center;
            animation: scaleNode 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s forwards;
        }

        @keyframes drawCircle {
            to { stroke-dashoffset: 0; }
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        @keyframes scaleNode {
            to { transform: scale(1); }
        }

        .logo-box:hover {
            transform: translateY(-6px) rotate(8deg) scale(1.05);
            background: rgba(99, 102, 241, 0.08);
            border-color: var(--flarklink-color);
            box-shadow: 0 16px 36px rgba(99, 102, 241, 0.4);
            color: #ffffff;
        }

        /* Typography Styles with entrance delay */
        .main-heading {
            font-family: 'Outfit', sans-serif;
            font-size: 3.25rem;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            transform: translateZ(40px);
            opacity: 0;
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--flarklink-color) 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            display: inline-block;
        }

        .description {
            font-size: 1.15rem;
            line-height: 1.75;
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto 2.5rem auto;
            transform: translateZ(25px);
            opacity: 0;
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .description .highlight {
            color: var(--text-primary);
            font-weight: 600;
            position: relative;
        }

        /* Status Badge */
        .status-badge-container {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.6rem 1.4rem;
            border-radius: 9999px;
            transform: translateZ(20px);
            opacity: 0;
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success-color);
            box-shadow: 0 0 12px var(--success-color);
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Footer Section */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem 0 0.5rem 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0;
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        }

        .copyright {
            letter-spacing: 0.01em;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
        }

        .social-link {
            color: var(--text-secondary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-link:hover {
            color: var(--text-primary);
            transform: translateY(-3px) scale(1.1);
        }

        .social-icon {
            width: 18px;
            height: 18px;
        }

        /* Entrance Animations */
        @keyframes fade-in-down {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scale-up-fade {
            from {
                opacity: 0;
                transform: scale(0.95) rotateX(4deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateX(0deg);
            }
        }

        /* Laptop / Desktop Layout Modifications */
        @media (min-width: 992px) {
            .glass-card {
                max-width: 960px;
                padding: 4.5rem;
                text-align: left;
            }
            
            .card-content-layout {
                flex-direction: row;
                align-items: center;
                gap: 4.5rem;
            }
            
            .card-left {
                flex: 1.1;
                align-items: flex-start;
                text-align: left;
            }
            
            .card-right {
                flex: 0.9;
                align-items: flex-start;
                text-align: left;
                border-left: 1px solid rgba(255, 255, 255, 0.08);
                padding-left: 4.5rem;
            }
            
            .logo-group {
                justify-content: flex-start;
                margin-bottom: 1.5rem;
            }
            
            .main-heading {
                text-align: left;
                margin-bottom: 0;
            }
            
            .description {
                text-align: left;
                margin: 0 0 2rem 0;
            }
            
            .status-badge-container {
                align-self: flex-start;
            }
        }

        /* Mobile Layout Modifications */
        @media (max-width: 640px) {
            .main-container {
                padding: 1rem;
            }
            
            .glass-card {
                padding: 2.25rem 1.25rem;
                border-radius: 20px;
                width: 100%;
                max-width: 94%;
            }
            
            .main-heading {
                font-size: 1.95rem;
                margin-bottom: 1rem;
            }
            
            .logo-group {
                margin-bottom: 1.5rem;
            }
            
            .logo-box {
                width: 64px;
                height: 64px;
                border-radius: 18px;
            }
            
            .logo-svg {
                width: 34px;
                height: 34px;
            }

            .description {
                font-size: 0.95rem;
                line-height: 1.6;
                margin-bottom: 1.75rem;
            }

            .status-badge-container {
                padding: 0.5rem 1.2rem;
            }

            .status-text {
                font-size: 0.72rem;
            }
            
            .footer {
                flex-direction: column-reverse;
                gap: 1.25rem;
                text-align: center;
                padding-top: 1.25rem;
            }
        }

        /* Extra Small Screen Adjustments */
        @media (max-width: 380px) {
            .glass-card {
                max-width: 100%;
            }

            .main-heading {
                font-size: 1.7rem;
            }
            
            .description {
                font-size: 0.88rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Full-screen WebGL-style Canvas Background -->
    <canvas id="canvas-bg"></canvas>
    
    <!-- Background Noise/Texture Overlay -->
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Floating Header -->
        <header class="header">
            <div class="brand-partnership">
                <span class="brand-pill">Official Release</span>
            </div>
        </header>

        <!-- Centered Glassmorphic Card -->
        <section class="card-wrapper">
            <div class="glass-card">
                <!-- Glowing Shimmer Sweep effect -->
                <div class="card-shimmer"></div>

                <div class="card-content-layout">
                    <div class="card-left">
                        <!-- Flarklink Logo Symbol with SVG drawing path animations -->
                        <div class="logo-group">
                            <div class="logo-box flarklink-logo-box" title="Flarklink" id="flarklink-logo">
                                <svg viewBox="0 0 100 100" class="logo-svg">
                                    <!-- Interconnected links/nodes representing flarklink -->
                                    <circle cx="50" cy="50" r="18" fill="none" stroke="currentColor" stroke-width="8" class="svg-circle-main"/>
                                    <circle cx="25" cy="25" r="12" fill="currentColor" class="svg-node-1"/>
                                    <circle cx="75" cy="75" r="12" fill="currentColor" class="svg-node-2"/>
                                    <line x1="25" y1="25" x2="38" y2="38" stroke="currentColor" stroke-width="8" stroke-linecap="round" class="svg-line-1"/>
                                    <line x1="62" y1="62" x2="75" y2="75" stroke="currentColor" stroke-width="8" stroke-linecap="round" class="svg-line-2"/>
                                </svg>
                            </div>
                        </div>

                        <!-- Main Copy -->
                        <h1 class="main-heading">
                            Something <span class="gradient-text">Exciting</span> is Coming
                        </h1>
                    </div>

                    <div class="card-right">
                        <p class="description">
                            <span class="highlight">Flarklink.com</span> is launching a brand new creative experience. We are building something powerful designed for developers, creators, and visual curators.
                        </p>

                        <!-- Status Badge -->
                        <div class="status-badge-container">
                            <div class="status-dot"></div>
                            <span class="status-text">Under Construction</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Modern Footer -->
        <footer class="footer">
            <p class="copyright">&copy; 2026 Flarklink. All rights reserved.</p>
            <div class="social-links">
                <a href="https://x.com" target="_blank" rel="noopener noreferrer" aria-label="Follow Flarklink on X" id="social-x" class="social-link">
                    <svg viewBox="0 0 24 24" class="social-icon">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="currentColor"/>
                    </svg>
                </a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Follow Flarklink on Instagram" id="social-instagram" class="social-link">
                    <svg viewBox="0 0 24 24" class="social-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                    </svg>
                </a>
                <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="Follow Flarklink on GitHub" id="social-github" class="social-link">
                    <svg viewBox="0 0 24 24" class="social-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                    </svg>
                </a>
            </div>
        </footer>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('canvas-bg');
            const ctx = canvas.getContext('2d');
            const glassCard = document.querySelector('.glass-card');
            const logoBox = document.getElementById('flarklink-logo');

            // 1. Setup Canvas sizing and High DPI adjustment
            let width, height;
            let isMobile = false;
            let starCount = 80;
            let connectionDist = 85;

            function resizeCanvas() {
                const dpi = window.devicePixelRatio || 1;
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpi;
                canvas.height = height * dpi;
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                ctx.scale(dpi, dpi);
                
                // Dynamically adjust parameters based on screen size (Responsive Performance)
                isMobile = width < 768;
                starCount = isMobile ? 35 : 80;
                connectionDist = isMobile ? 65 : 85;
                
                // Re-adjust stars array count
                if (stars) {
                    while (stars.length < starCount) {
                        stars.push(new StarParticle(true));
                    }
                    if (stars.length > starCount) {
                        stars.length = starCount;
                    }
                }

                // Scale down Blobs sizes on mobile screens
                if (blobs) {
                    blobs.forEach((blob, index) => {
                        const baseRadii = [650, 580, 600, 520, 450];
                        blob.radius = isMobile ? baseRadii[index] * 0.55 : baseRadii[index];
                    });
                }
            }

            // Mouse and Touch position tracking
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let targetMouseX = mouseX;
            let targetMouseY = mouseY;
            let isMouseOnScreen = false;

            // Desktop Mouse Move Listener
            window.addEventListener('mousemove', (e) => {
                targetMouseX = e.clientX;
                targetMouseY = e.clientY;
                isMouseOnScreen = true;
                updateCardEffects(e.clientX, e.clientY);
            });

            // Touch Move (Drag) Listener for Mobile Devices
            window.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    targetMouseX = e.touches[0].clientX;
                    targetMouseY = e.touches[0].clientY;
                    isMouseOnScreen = true;
                    updateCardEffects(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });

            // Touch Start (Tap) Listener for Mobile Devices (Triggers Click Shockwaves too)
            window.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) {
                    targetMouseX = e.touches[0].clientX;
                    targetMouseY = e.touches[0].clientY;
                    isMouseOnScreen = true;
                    updateCardEffects(e.touches[0].clientX, e.touches[0].clientY);
                    
                    // Trigger shockwave on mobile touch points
                    shockwaves.push(new Shockwave(e.touches[0].clientX, e.touches[0].clientY));
                }
            }, { passive: true });

            // Reset touch track on release
            window.addEventListener('touchend', () => {
                isMouseOnScreen = false;
                resetCardEffects();
            });

            window.addEventListener('mouseleave', () => {
                isMouseOnScreen = false;
                resetCardEffects();
            });

            // Helper function to update 3D card tilt and lighting coords
            function updateCardEffects(clientX, clientY) {
                if (glassCard) {
                    const rect = glassCard.getBoundingClientRect();
                    const x = clientX - rect.left;
                    const y = clientY - rect.top;
                    glassCard.style.setProperty('--mouse-x', `${x}px`);
                    glassCard.style.setProperty('--mouse-y', `${y}px`);

                    if (!isMobile) {
                        const cardCenterX = rect.left + rect.width / 2;
                        const cardCenterY = rect.top + rect.height / 2;
                        const angleX = (cardCenterY - clientY) / 30; 
                        const angleY = (clientX - cardCenterX) / 30;
                        glassCard.style.transform = `perspective(1000px) rotateX(${angleX}deg) rotateY(${angleY}deg)`;
                    }
                }
            }

            function resetCardEffects() {
                if (glassCard) {
                    glassCard.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
                    glassCard.style.transition = 'transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                }
            }

            if (glassCard) {
                glassCard.addEventListener('mouseenter', () => {
                    if (!isMobile) {
                        glassCard.style.transition = 'border-color 0.5s ease, transform 0.1s ease-out';
                    }
                });
            }

            // Click Shockwave System (Pure Interactive Agg)
            const shockwaves = [];
            window.addEventListener('click', (e) => {
                shockwaves.push(new Shockwave(e.clientX, e.clientY));
            });

            class Shockwave {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.currentRadius = 0;
                    // Smaller shockwaves on mobile to prevent clutter
                    this.maxRadius = isMobile ? 220 : 400;
                    this.speed = isMobile ? 7 : 10;
                    this.opacity = 0.8;
                }
                update() {
                    this.currentRadius += this.speed;
                    this.opacity = 1 - (this.currentRadius / this.maxRadius);
                }
                draw() {
                    if (this.opacity <= 0) return;
                    
                    // Main shockwave wave-front ring
                    ctx.strokeStyle = `rgba(168, 85, 247, ${this.opacity * 0.25})`;
                    ctx.lineWidth = isMobile ? 2.5 : 4;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.currentRadius, 0, Math.PI * 2);
                    ctx.stroke();

                    // Inner bright Indigo ring
                    ctx.strokeStyle = `rgba(99, 102, 241, ${this.opacity * 0.12})`;
                    ctx.lineWidth = isMobile ? 8 : 14;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, Math.max(0, this.currentRadius - (isMobile ? 12 : 20)), 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // 2. Fluid Mesh Gradient Blobs definitions
            class FluidBlob {
                constructor(color, radius, speedMultiplier) {
                    this.color = color;
                    this.radius = radius;
                    this.speedMultiplier = speedMultiplier;
                    
                    this.baseX = Math.random() * window.innerWidth;
                    this.baseY = Math.random() * window.innerHeight;
                    this.x = this.baseX;
                    this.y = this.baseY;
                    
                    this.vx = (Math.random() - 0.5) * 0.5 * speedMultiplier;
                    this.vy = (Math.random() - 0.5) * 0.5 * speedMultiplier;
                    
                    this.driftAngle = Math.random() * Math.PI * 2;
                    this.driftSpeed = 0.0002 + Math.random() * 0.0003;
                }

                update(time) {
                    this.baseX += this.vx;
                    this.baseY += this.vy;

                    if (this.baseX < 0 || this.baseX > width) this.vx *= -1;
                    if (this.baseY < 0 || this.baseY > height) this.vy *= -1;

                    this.driftAngle += this.driftSpeed;
                    const driftOffset = Math.sin(this.driftAngle + time * 0.0004) * (isMobile ? 80 : 150);
                    
                    let targetX = this.baseX + driftOffset;
                    let targetY = this.baseY + Math.cos(this.driftAngle * 1.3) * (isMobile ? 60 : 120);

                    // Mouse/Touch gravity pull (magnetic background)
                    if (isMouseOnScreen) {
                        const dx = mouseX - targetX;
                        const dy = mouseY - targetY;
                        const dist = Math.hypot(dx, dy);
                        const pullRadius = isMobile ? 450 : 900;
                        if (dist < pullRadius) {
                            const force = (pullRadius - dist) / pullRadius * (isMobile ? 0.22 : 0.18);
                            targetX += dx * force;
                            targetY += dy * force;
                        }
                    }

                    this.x += (targetX - this.x) * 0.04;
                    this.y += (targetY - this.y) * 0.04;
                }

                draw() {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                    gradient.addColorStop(0, this.color);
                    gradient.addColorStop(1, 'rgba(5, 5, 8, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Create background color blobs
            const blobs = [
                new FluidBlob('rgba(99, 102, 241, 0.32)', 650, 1.2), // Indigo
                new FluidBlob('rgba(168, 85, 247, 0.28)', 580, 0.9), // Purple
                new FluidBlob('rgba(244, 63, 94, 0.22)', 600, 1.4),   // Rose
                new FluidBlob('rgba(6, 182, 212, 0.24)', 520, 1.0),   // Cyan
                new FluidBlob('rgba(99, 102, 241, 0.15)', 450, 0.7)  // Secondary Indigo
            ];

            // 3. Cosmic Floating Star Particles
            class StarParticle {
                constructor(initial = false) {
                    this.x = Math.random() * window.innerWidth;
                    this.y = initial ? Math.random() * window.innerHeight : height + 15;
                    this.radius = Math.random() * 1.5 + 0.5;
                    
                    this.speedX = (Math.random() - 0.5) * 0.25;
                    this.speedY = -Math.random() * 0.5 - 0.15;
                    
                    this.opacity = Math.random() * 0.6 + 0.15;
                    this.impulseX = 0;
                    this.impulseY = 0;
                }

                update() {
                    this.x += this.speedX + this.impulseX;
                    this.y += this.speedY + this.impulseY;
                    
                    this.impulseX *= 0.93;
                    this.impulseY *= 0.93;

                    // Mouse/Touch push-back physics
                    if (isMouseOnScreen) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const dist = Math.hypot(dx, dy);
                        const pushRadius = isMobile ? 100 : 160;
                        if (dist < pushRadius) {
                            const force = (pushRadius - dist) / pushRadius * (isMobile ? 2.2 : 1.6);
                            const angle = Math.atan2(dy, dx);
                            this.x += Math.cos(angle) * force;
                            this.y += Math.sin(angle) * force;
                        }
                    }

                    // Shockwave impacts
                    shockwaves.forEach(wave => {
                        const dx = this.x - wave.x;
                        const dy = this.y - wave.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < wave.currentRadius && dist > wave.currentRadius - 60) {
                            const factor = (1 - (dist / wave.maxRadius));
                            const pushForce = factor * (isMobile ? 10 : 16);
                            const angle = Math.atan2(dy, dx);
                            this.impulseX += Math.cos(angle) * pushForce;
                            this.impulseY += Math.sin(angle) * pushForce;
                        }
                    });

                    // Reset when offscreen
                    if (this.y < -15 || this.x < -15 || this.x > width + 15) {
                        this.x = Math.random() * width;
                        this.y = height + 15;
                        this.radius = Math.random() * 1.5 + 0.5;
                        this.speedX = (Math.random() - 0.5) * 0.25;
                        this.speedY = -Math.random() * 0.5 - 0.15;
                        this.opacity = Math.random() * 0.6 + 0.15;
                        this.impulseX = 0;
                        this.impulseY = 0;
                    }
                }

                draw() {
                    ctx.fillStyle = `rgba(244, 244, 245, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Create array of stars and trigger initial resize
            const stars = [];
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 4. Main Animation Frame Loop
            let time = 0;
            function animate() {
                time++;

                ctx.fillStyle = '#050508';
                ctx.fillRect(0, 0, width, height);

                // Touch/Mouse smoothing
                mouseX += (targetMouseX - mouseX) * 0.08;
                mouseY += (targetMouseY - mouseY) * 0.08;

                ctx.globalCompositeOperation = 'screen';

                // A. Update and Draw Fluid Gradient Blobs
                blobs.forEach(blob => {
                    blob.update(time);
                    blob.draw();
                });

                ctx.globalCompositeOperation = 'source-over';

                // B. Update and Draw Shockwaves
                for (let i = shockwaves.length - 1; i >= 0; i--) {
                    shockwaves[i].update();
                    shockwaves[i].draw();
                    if (shockwaves[i].opacity <= 0) {
                        shockwaves.splice(i, 1);
                    }
                }

                // C. Update and Draw Stars
                stars.forEach(star => {
                    star.update();
                    star.draw();
                });

                // Draw constellation link lines between nearby stars (Responsive Distance limit)
                ctx.lineWidth = 0.5;
                for (let i = 0; i < stars.length; i++) {
                    for (let j = i + 1; j < stars.length; j++) {
                        const dx = stars[i].x - stars[j].x;
                        const dy = stars[i].y - stars[j].y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < connectionDist) {
                            const opacityMultiplier = (1 - (dist / connectionDist)) * (isMobile ? 0.11 : 0.15);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacityMultiplier})`;
                            ctx.beginPath();
                            ctx.moveTo(stars[i].x, stars[i].y);
                            ctx.lineTo(stars[j].x, stars[j].y);
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animate);
            }
            animate();

            // 5. Logo hover 3D interaction (Secondary layer, only on non-mobile)
            if (logoBox) {
                logoBox.addEventListener('mousemove', (e) => {
                    if (isMobile) return;
                    const rect = logoBox.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width/2;
                    const y = e.clientY - rect.top - rect.height/2;
                    logoBox.style.transform = `translateY(-6px) scale(1.08) rotateX(${-y/2}deg) rotateY(${x/2}deg)`;
                });
                
                logoBox.addEventListener('mouseleave', () => {
                    logoBox.style.transform = '';
                });
            }
        });
    </script>
</body>
</html>
